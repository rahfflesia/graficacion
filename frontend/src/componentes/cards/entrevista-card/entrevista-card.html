<modal-editar-entrevista
  [toggler]="esModalEditarEntrevistaVisible"
  (cerrar)="ocultarModalEditarEntrevista()"
  [entrevista]="entrevista"
  [participantes]="listaParticipantes"
  (entrevistaEditada)="entrevistaEditada.emit($event)"
></modal-editar-entrevista>
@if (estaModoEliminarActivo) {
  <div class="entrevista-card-eliminacion flex-column xs-gap">
    <span>{{ entrevista?.entrevista?.nombre }}</span>
    <div class="mensaje-confirmacion">
      <span>¿Seguro que deseas eliminar esta entrevista?</span>
      <div class="wrapper-botones-eliminar input-wrapper-row">
        <button class="default-button" (click)="eliminarEntrevista(); $event.stopPropagation()">
          Sí
        </button>
        <button class="default-button" (click)="desactivarModoEliminar(); $event.stopPropagation()">
          No
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="entrevista-card">
    <h4>{{ entrevista?.entrevista?.nombre }}</h4>
    <div class="wrapper-botones input-wrapper-row">
      <button
        class="default-button"
        (click)="mostrarModalEditarEntrevista(); $event.stopPropagation()"
      >
        Editar
      </button>
      <button class="default-button" (click)="activarModoEliminar(); $event.stopPropagation()">
        Eliminar
      </button>
    </div>
  </div>
}
