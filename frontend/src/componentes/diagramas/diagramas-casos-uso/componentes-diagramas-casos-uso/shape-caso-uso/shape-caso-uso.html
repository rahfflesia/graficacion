<ng-diagram-node-resize-adornment>
  <div class="shape-caso-uso">
    @if (estaModoEdicionCasoUsoActivo) {
      <input
        type="text"
        class="shape-input"
        [(ngModel)]="node().data.textoCasoUso"
        (keydown.enter)="desactivarModoEdicionCasoUso()"
      />
    } @else {
      <span (dblclick)="activarModoEdicionCasoUso()">{{ node().data.textoCasoUso }}</span>
    }
    <ng-diagram-port [side]="'left'" [type]="'both'" [id]="'port-left'" />
    <ng-diagram-port [side]="'right'" [type]="'both'" [id]="'port-right'" />
  </div>
</ng-diagram-node-resize-adornment>
