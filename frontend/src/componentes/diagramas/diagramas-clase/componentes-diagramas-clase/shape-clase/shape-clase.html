  </div>
  <div class="atributos">
    <div class="atributos-contenido-interno">
      <ul>
        <li>Área</li>
        <li>Perímetro</li>
      </ul>
    </div>
  </div>
  <div class="metodos">

  <ng-diagram-port [side]="'left'" [type]="'both'" [id]="'port-left'" />
