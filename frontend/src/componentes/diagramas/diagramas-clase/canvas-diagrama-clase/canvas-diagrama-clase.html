<div class="canvas-wrapper">
  <ng-diagram
    [model]="model"
    class="canvas"
    [nodeTemplateMap]="nodeTemplateMap"
    (drop)="onDrop($event)"
  ></ng-diagram>
  <div class="menu-lateral flex-column md-gap" [class.animar-menu-lateral]="estaAbiertoMenuLateral">
    <header>
      <div>
        <h3>Menú de componentes</h3>
        <span>Selecciona uno</span>
      </div>
      <div class="close-button" (click)="cerrarMenuLateral()">X</div>
    </header>
    <div class="seccion-componentes">
      <div
        draggable="true"
        (dragstart)="onDragStart($event, 'diagramaClase')"
        (click)="agregarForma('diagramaClase', 'click')"
        class="menu-shape"
      >
        <div class="nombre-shape">Clase</div>
        <div class="atributos-shape">Atributos</div>
        <div class="metodos-shape">Métodos</div>
      </div>
      <div
        draggable="true"
        (dragstart)="onDragStart($event, 'diagramaInterfaz')"
        (click)="agregarForma('diagramaInterfaz', 'click')"
        class="menu-shape"
      >
        <div class="nombre-shape">Interfaz</div>
        <div class="metodos-shape">Métodos</div>
      </div>
      <div
        draggable="true"
        (dragstart)="onDragStart($event, 'diagramaEnum')"
        (click)="agregarForma('diagramaEnum', 'click')"
        class="menu-shape"
      >
        <div class="nombre-shape">Enum</div>
        <div class="metodos-shape">Valores</div>
      </div>
      <div
        draggable="true"
        (dragstart)="onDragStart($event, 'etiqueta')"
        (click)="agregarForma('etiqueta', 'click')"
        style="display: grid; place-items: center"
      >
        <div class="menu-shape" style="padding: 0.25rem 0.5rem">Etiqueta</div>
      </div>
      <div
        draggable="true"
        (dragstart)="onDragStart($event, 'paquete')"
        (click)="agregarForma('paquete', 'click')"
        class="paquete-shape"
        style="cursor: grab"
      >
        <span>texto</span>
        <div>Paquete</div>
      </div>
    </div>
  </div>
  <div class="barra-flotante">
    <div>
      <h3>Creación de diagramas de clase (Editando)</h3>
    </div>
    @if (!estaAbiertoMenuLateral) {
      <div class="abrir-menu" (click)="abrirMenuLateral()">
        <img
          src="https://img.icons8.com/?size=100&id=8113&format=png&color=000000"
          alt="hamburger-menu"
        />
      </div>
    }
    <div
      class="guardar"
      (click)="esDiagramaExistente ? editarDiagramaClase() : crearDiagramaClase()"
    >
      <img
        src="https://img.icons8.com/?size=100&id=18764&format=png&color=ffffff"
        alt="icono-guardar"
      />
    </div>
  </div>
  <ng-diagram-minimap></ng-diagram-minimap>
</div>
