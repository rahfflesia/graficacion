<ng-diagram-node-resize-adornment>
  <div class="shape-paquete">
    @if (estaModoEdicionActivado) {
      <input
        type="text"
        class="shape-input"
        [(ngModel)]="node().data.nombrePaquete"
        (keydown.enter)="desactivarModoEdicion()"
      />
    } @else {
      <div class="pestana" (dblclick)="activarModoEdicion()">{{ node().data.nombrePaquete }}</div>
    }
    <div class="cuerpo"></div>
    <ng-diagram-port [side]="'left'" [type]="'both'" [id]="'port-left'" />
    <ng-diagram-port [side]="'right'" [type]="'both'" [id]="'port-right'" />
    <ng-diagram-port [side]="'top'" [type]="'both'" [id]="'port-top'" />
    <ng-diagram-port [side]="'bottom'" [type]="'both'" [id]="'port-bottom'" />
  </div>
</ng-diagram-node-resize-adornment>
