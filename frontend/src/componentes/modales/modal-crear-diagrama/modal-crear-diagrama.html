<div class="overlay" [class.animar]="toggler">
  <div class="modal modal-menu-diagrama" [class.animar]="toggler">
    <header>
      <h2>¿Qué diagrama quieres crear?</h2>
      <div class="close" (click)="cerrar.emit()">
        <img
          src="https://img.icons8.com/?size=100&id=8112&format=png&color=000000"
          alt="close-icon"
        />
      </div>
    </header>
    <div class="opciones-diagramas flex-column md-gap">
      <button class="boton-menu-diagrama" (click)="seleccionarDiagrama.emit('clase')">
        <span>Crear diagrama de clases</span>
      </button>
      <button class="boton-menu-diagrama" (click)="seleccionarDiagrama.emit('casos_uso')">
        <span>Crear diagrama de casos de uso</span>
      </button>
      <button class="boton-menu-diagrama" (click)="seleccionarDiagrama.emit('secuencia')">
        <span>Crear diagrama de secuencia</span>
      </button>
      <button class="boton-menu-diagrama" (click)="seleccionarDiagrama.emit('paquetes')">
        <span>Crear diagrama de paquetes</span>
      </button>
    </div>
  </div>
</div>
