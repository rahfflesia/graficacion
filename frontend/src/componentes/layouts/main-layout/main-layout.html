<div class="main-layout">
  <navbar></navbar>
  <main>
    <div class="section-header flex-center">
      <div class="hamburger-menu">
        <img
          src="https://img.icons8.com/?size=100&id=3096&format=png&color=#111c2d"
          alt="hamburguer-menu"
        />
      </div>
      <div class="more-options flex-center">
        <input type="text" placeholder="Busca cualquier cosa..." class="search-input" />
        <div class="modo" (click)="alternarTema()" title="Cambiar tema">
          <img
            [src]="
              temaActual() === 'oscuro'
                ? 'https://img.icons8.com/?size=100&id=URphhfIjBd0M&format=png&color=ffffff'
                : 'https://img.icons8.com/?size=100&id=45474&format=png&color=111c2d'
            "
            alt="dark-mode-icon"
          />
        </div>
        <div class="notificaciones">
          <img
            src="https://img.icons8.com/?size=100&id=11642&format=png&color=111c2d"
            alt="notifications-icon"
          />
        </div>
        <div class="info-perfil">
          <div class="foto">
            <img src="{{ usuario()?.usuario?.pfp }}" alt="default-pfp" />
          </div>
          <div class="datos-usuario flex-column">
            <span class="username">{{ usuario()?.usuario?.nombre }}</span>
            <span class="role">Rol</span>
          </div>
        </div>
      </div>
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
